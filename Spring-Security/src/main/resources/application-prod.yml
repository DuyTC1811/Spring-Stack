server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      auto-commit: true
      idle-timeout: 20000
      maximum-pool-size: 10
      max-lifetime: 200000
      connection-timeout: 20000
      pool-name: '[ CONNECT ] ===>'

  liquibase:
    change-log: classpath:liquibase/main-changelog.yml
    clear-checksums: false

  security:
    access-token: ${JWT_ACCESS_SECRET}
    access-token-time: ${JWT_ACCESS_TTL_MS:900000}
    refresh-token: ${JWT_REFRESH_SECRET}
    refresh-token-time: ${JWT_REFRESH_TTL_MS:604800000}
    verified-token: ${JWT_VERIFIED_SECRET}
    verified-token-time: ${JWT_VERIFIED_TTL_MS:600000}

  mail:
    default-encoding: UTF-8
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    mail-from: ${MAIL_FROM}
    protocol: smtp
    test-connection: true
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  freemarker:
    template-loader-path: classpath:/templates/mail
    suffix: .ftlh
    cache: true
    charset: UTF-8

springdoc:
  api-docs:
    enabled: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: org.example.springsecurity.requests, org.example.springsecurity.responses
  type-handlers-package: org.example.springsecurity.util
  mapper-locations: classpath:/mybatis/*.xml

cors:
  allowed:
    origins:
      - ${CORS_ORIGINS}
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    headers:
      - Content-Type
      - Authorization
