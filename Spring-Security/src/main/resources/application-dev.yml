server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    hikari:
      auto-commit: true
      idle-timeout: 20000
      maximum-pool-size: 2
      max-lifetime: 200000
      connection-timeout: 20000
      pool-name: '[ CONNECT ] ===>'

  liquibase:
    change-log: classpath:liquibase/main-changelog.yml
    clear-checksums: true

  jwt:
    access-secret: ${JWT_ACCESS_SECRET:}
    access-time: ${JWT_ACCESS_TTL_MS:900000}
    refresh-secret: ${JWT_REFRESH_SECRET:}
    refresh-time: ${JWT_REFRESH_TTL_MS:604800000}
    verified-secret: ${JWT_VERIFIED_SECRET:}
    verified-time: ${JWT_VERIFIED_TTL_MS:600000}

  mail:
    default-encoding: UTF-8
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    mail-from: ${MAIL_FROM:}
    protocol: smtp
    test-connection: false
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  freemarker:
    template-loader-path: classpath:/templates/mail
    suffix: .ftlh
    cache: true
    charset: UTF-8

springdoc:
  api-docs:
    url-product: http://localhost:8080
    url-dev: http://localhost:8080

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: org.example.springsecurity.requests, org.example.springsecurity.responses
  type-handlers-package: org.example.springsecurity.util
  mapper-locations: classpath:/mybatis/*.xml

cors:
  allowed:
    origins:
      - ${CORS_ORIGINS:http://localhost:4200}
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    headers:
      - Content-Type
      - Authorization
